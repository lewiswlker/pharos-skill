name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: EIP-712 signing self-check
        run: python tests/test_eip712.py

      - name: Full local end-to-end self-check
        run: python tests/test_e2e_local.py
